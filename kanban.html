<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Operations — Service Board</title>
  <script crossorigin="" src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin="" src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS3DRenderer.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    :root {
        /* DARK THEME — Obsidian Kitchen */
        --primary-color: #c8a96e;       /* aged brass / burnished gold */
        --secondary-color: #a07850;     /* copper */
        --success-color: #7a9e7e;       /* sage */
        --warning-color: #c8a058;       /* amber */
        --danger-color: #c0504a;        /* brick red */
        --dark-bg: #111110;
        --light-bg: #1a1a18;
        --ui-bg: rgba(26, 26, 24, 0.82);
        --card-bg: rgba(28, 28, 26, 0.90);
        --text-primary: #e8e2d8;
        --text-secondary: #7a7468;
        --border-color: rgba(200, 169, 110, 0.12);
        --shadow-sm: 0 1px 3px rgba(0,0,0,0.5);
        --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
        --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
        --sms-color: #7a9e7e;
        --urgent-glow: rgba(192, 80, 74, 0.25);
        --vh: 1vh;
        --body-gradient: #111110;
        --font-heading: 'Cormorant Garamond', serif;
        --font-body: 'Jost', sans-serif;
        --accent-line: rgba(200, 169, 110, 0.35);
    }

    /* LIGHT THEME — Ivory Mise en Place */
    body.light-theme {
        --primary-color: #8a6a3a;
        --secondary-color: #6a4e2a;
        --success-color: #4a7a54;
        --warning-color: #9a7030;
        --danger-color: #9a3830;
        --dark-bg: #f5f0e8;
        --light-bg: #faf7f2;
        --ui-bg: rgba(250, 247, 242, 0.88);
        --card-bg: #faf7f2;
        --text-primary: #1c1a16;
        --text-secondary: #8a8070;
        --border-color: rgba(138, 106, 58, 0.18);
        --shadow-sm: 0 1px 3px rgba(60,40,10,0.08);
        --shadow-md: 0 4px 16px rgba(60,40,10,0.10);
        --shadow-lg: 0 12px 40px rgba(60,40,10,0.12);
        --sms-color: #4a7a54;
        --urgent-glow: rgba(154, 56, 48, 0.12);
        --body-gradient: #f5f0e8;
        --font-heading: 'Cormorant Garamond', serif;
        --font-body: 'Jost', sans-serif;
        --accent-line: rgba(138, 106, 58, 0.25);
    }
    
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: var(--font-body);
        background: var(--body-gradient);
        min-height: calc(100 * var(--vh));
        color: var(--text-primary);
        overflow: hidden;
        transition: background 0.5s ease, color 0.3s ease;
        letter-spacing: 0.01em;
    }

    /* Refined particle — no confetti, subtle dust motes */
    .confetti-particle {
      position: fixed;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    body.light-theme #vignette {
        background: radial-gradient(ellipse at center, transparent 50%, rgba(60,40,10,0.06) 100%);
    }
    
    #three-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transition: opacity 0.5s ease;
    }
    
    #vignette {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.45) 100%);
      z-index: 10;
      transition: background 0.5s ease;
    }

    /* Heading typography — Cormorant for all headings */
    h1, h2, h3, .header-title, .column-title, .modal-title,
    .right-panel-title, .right-panel-content h4, .right-panel-content h5 {
        font-family: var(--font-heading);
        letter-spacing: 0.03em;
    }

    /* Theme Toggle Button — minimal ring */
    .theme-toggle-btn {
        background: transparent;
        border: 1px solid var(--accent-line);
        color: var(--text-secondary);
        width: 36px;
        height: 36px;
        border-radius: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.25s ease;
        font-size: 14px;
    }
    .theme-toggle-btn:hover {
        border-color: var(--primary-color);
        color: var(--primary-color);
    }

    /* SMS-specific animations — subdued pulse */
    @keyframes urgentPulse {
      0% { box-shadow: 0 0 0 0 var(--urgent-glow); }
      60% { box-shadow: 0 0 12px 6px var(--urgent-glow); }
      100% { box-shadow: 0 0 0 0 var(--urgent-glow); }
    }

    .urgent-sms-alert {
      animation: urgentPulse 3s infinite;
    }

    /* SMS Button Styles */
    .sms-btn {
      background: transparent;
      color: var(--sms-color);
      border: 1px solid var(--sms-color);
      padding: 6px 14px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.25s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .sms-btn:hover {
      background: var(--sms-color);
      color: white;
    }

    /* Urgent Requests Column */
    .urgent-requests-column {
      border: 1px solid rgba(192, 80, 74, 0.4);
      background: rgba(192, 80, 74, 0.03);
    }

    body.light-theme .urgent-requests-column {
        background: rgba(154, 56, 48, 0.03);
        border: 1px solid rgba(154, 56, 48, 0.3);
    }

    .urgent-requests-column .column-header {
      background: rgba(192, 80, 74, 0.06);
      margin: -20px -20px 20px -20px;
      padding: 20px;
      border-bottom: 1px solid rgba(192, 80, 74, 0.3);
    }

    /* SMS Request Card */
    .sms-request-card {
      border-left: 2px solid var(--sms-color);
      position: relative;
    }

    .sms-request-card::before {
      content: '';
      position: absolute;
      top: 10px;
      right: 10px;
      width: 5px;
      height: 5px;
      background: var(--sms-color);
      border-radius: 50%;
      animation: urgentPulse 3s infinite;
    }

    .sms-badge {
      background: transparent;
      color: var(--sms-color);
      border: 1px solid var(--sms-color);
      padding: 2px 6px;
      border-radius: 2px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Phone Number Input */
    .phone-input-group {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .phone-input {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid var(--border-color);
      border-radius: 2px;
      font-size: 13px;
      font-family: var(--font-body);
      background: var(--light-bg);
      color: var(--text-primary);
    }

    .verify-btn {
      background: transparent;
      color: var(--primary-color);
      border: 1px solid var(--primary-color);
      padding: 9px 16px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      font-family: var(--font-body);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: all 0.25s ease;
    }

    .verify-btn:hover {
      background: var(--primary-color);
      color: #fff;
    }

    .verified-badge {
      background: transparent;
      color: var(--success-color);
      border: 1px solid var(--success-color);
      padding: 3px 8px;
      border-radius: 2px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    /* Enhanced Toast for SMS */
    .sms-toast {
      background: var(--dark-bg);
      border: 1px solid var(--sms-color);
      border-left: 3px solid var(--sms-color);
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: var(--text-primary);
      padding: 14px 18px;
      border-radius: 2px;
      box-shadow: var(--shadow-md);
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 1001;
      max-width: 300px;
      animation: slideInToast 0.3s ease-out;
    }

    /* Live Status Indicator */
    .live-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px;
      background: transparent;
      border: 1px solid var(--accent-line);
      border-radius: 2px;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--success-color);
    }

    .live-dot {
      width: 5px;
      height: 5px;
      background: var(--success-color);
      border-radius: 50%;
      animation: pulse 2.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Include all original styles from kanban.html */
    .app-container {
        display: flex;
        height: calc(100 * var(--vh));
    }

    .sidebar {
        width: 260px;
        background: var(--ui-bg);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        color: var(--text-primary);
        padding: 28px 20px;
        overflow-y: auto;
        transition: width 0.3s ease, background 0.3s ease;
        border-right: 1px solid var(--border-color);
    }

    .sidebar.collapsed {
        width: 56px;
        padding: 28px 10px;
    }

    .sidebar.collapsed .user-info, .sidebar.collapsed .nav-link span, .sidebar.collapsed .notification-badge {
        display: none;
    }

    .sidebar.collapsed .user-profile {
        justify-content: center;
    }

    .sidebar.collapsed .nav-link {
        justify-content: center;
        padding: 12px;
    }

    .user-profile {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 28px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border-color);
    }

    .user-avatar {
        width: 44px;
        height: 44px;
        border-radius: 2px;
        background: var(--primary-color);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 500;
        font-size: 16px;
        color: var(--dark-bg);
        letter-spacing: 0;
    }

    .user-info h3 {
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 3px;
        font-family: var(--font-body);
    }

    .user-info p {
        font-size: 11px;
        opacity: 0.5;
        letter-spacing: 0.04em;
    }

    .nav-menu {
        list-style: none;
    }

    .nav-item {
        margin-bottom: 2px;
    }

    .nav-link {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        color: var(--text-secondary);
        text-decoration: none;
        border-radius: 2px;
        transition: all 0.2s ease;
        font-size: 13px;
        letter-spacing: 0.03em;
        cursor: pointer;
    }

    .nav-link:hover,
    .nav-link.active {
        background: rgba(200, 169, 110, 0.06);
        color: var(--text-primary);
    }
    
    body.light-theme .nav-link.active {
        background: rgba(138, 106, 58, 0.08);
        color: var(--primary-color);
    }

    .nav-link i {
        width: 18px;
        text-align: center;
        opacity: 0.7;
    }

    .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        transition: margin-left 0.3s ease;
    }

    .header {
        background: var(--ui-bg);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        padding: 16px 28px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 50;
        transition: background 0.3s ease, border-color 0.3s ease;
    }

    .header-title {
        font-size: 22px;
        font-weight: 300;
        letter-spacing: 0.08em;
        font-family: var(--font-heading);
        font-style: italic;
    }

    .header-actions {
        display: flex;
        gap: 10px;
        align-items: center;
    }

    .btn {
        padding: 8px 18px;
        border: 1px solid transparent;
        border-radius: 2px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        font-family: var(--font-body);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .btn-primary {
        background: transparent;
        color: var(--primary-color);
        border-color: var(--primary-color);
    }

    .btn-primary:hover {
        background: var(--primary-color);
        color: var(--dark-bg);
    }

    .btn-secondary {
        background: transparent;
        color: var(--text-secondary);
        border-color: var(--border-color);
    }

    .btn-secondary:hover {
        border-color: var(--text-secondary);
        color: var(--text-primary);
    }

    .kanban-container {
        flex: 1;
        padding: 24px;
        overflow-x: auto;
        overflow-y: auto;
        position: relative;
    }

    .kanban-container.scrollable::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 24px;
      background: linear-gradient(to left, var(--dark-bg), transparent);
      pointer-events: none;
      z-index: 5;
    }

    .kanban-board {
        display: flex;
        gap: 16px;
        min-height: 600px;
    }

    .kanban-column {
        flex: 1;
        min-width: 290px;
        background: var(--ui-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border-color);
        border-radius: 2px;
        padding: 20px;
        transition: background 0.3s ease, border-color 0.3s ease;
    }

    .kanban-column.drag-over {
      background: rgba(200, 169, 110, 0.05);
      border-color: var(--primary-color);
    }

    .column-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 18px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--border-color);
    }

    .column-title {
        font-size: 15px;
        font-weight: 400;
        letter-spacing: 0.06em;
        font-family: var(--font-heading);
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .column-count {
        background: transparent;
        border: 1px solid var(--accent-line);
        padding: 1px 7px;
        border-radius: 2px;
        font-size: 10px;
        font-weight: 500;
        font-family: var(--font-body);
        color: var(--text-secondary);
        letter-spacing: 0.04em;
    }

    .notes-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-height: 200px;
    }

    .note-card {
        transform-style: preserve-3d;
        background: var(--card-bg);
        backdrop-filter: blur(16px);
        border-radius: 2px;
        padding: 14px 16px;
        box-shadow: var(--shadow-sm);
        cursor: move;
        transition: all 0.2s ease;
        border: 1px solid var(--border-color);
        border-left: 2px solid var(--primary-color);
        opacity: 1 !important;
        user-select: none;
    }

    .note-card:hover {
        box-shadow: var(--shadow-md);
        transform: translateY(-1px);
        border-color: var(--accent-line);
        border-left-width: 2px;
    }

    .note-card.dragging {
        opacity: 0.4;
        transform: rotate(1deg) scale(1.02);
        z-index: 10000; 
    }

    .note-card.urgent {
        border-left-color: var(--danger-color);
    }

    .note-card.high {
        border-left-color: var(--warning-color);
    }

    .note-card.medium {
        border-left-color: var(--primary-color);
    }

    .note-card.low {
        border-left-color: var(--success-color);
    }

    .note-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 10px;
    }

    .note-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-primary);
        flex: 1;
        letter-spacing: 0.02em;
    }

    .note-priority {
        padding: 2px 7px;
        border-radius: 2px;
        font-size: 9px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        border: 1px solid;
    }

    .priority-urgent {
        border-color: var(--danger-color);
        color: var(--danger-color);
        background: transparent;
    }

    .priority-high {
        border-color: var(--warning-color);
        color: var(--warning-color);
        background: transparent;
    }

    .priority-medium {
        border-color: var(--primary-color);
        color: var(--primary-color);
        background: transparent;
    }

    .priority-low {
        border-color: var(--success-color);
        color: var(--success-color);
        background: transparent;
    }

    .note-content {
        font-size: 12px;
        color: var(--text-secondary);
        line-height: 1.6;
        margin-bottom: 12px;
    }

    .note-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 10px;
        color: var(--text-secondary);
        gap: 10px;
    }

    .note-meta {
        display: flex;
        gap: 10px;
    }

    .note-meta span {
        display: flex;
        align-items: center;
        gap: 4px;
        opacity: 0.7;
    }

    .note-assignee {
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .assignee-avatar {
        width: 18px;
        height: 18px;
        border-radius: 2px;
        background: var(--primary-color);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 8px;
        font-weight: 600;
        color: var(--dark-bg);
    }

    .note-actions {
        display: flex;
        gap: 2px;
    }

    .note-action-btn {
        background: none;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        padding: 4px 6px;
        border-radius: 2px;
        transition: all 0.2s ease;
        opacity: 0.6;
    }

    .note-action-btn:hover {
        background: rgba(200, 169, 110, 0.08);
        color: var(--primary-color);
        opacity: 1;
    }

    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        backdrop-filter: blur(6px);
    }

    .modal {
        background: var(--card-bg);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--border-color);
        border-radius: 2px;
        padding: 28px;
        width: 90%;
        max-width: 480px;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: var(--shadow-lg);
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border-color);
    }

    .modal-title {
        font-size: 20px;
        font-weight: 300;
        font-family: var(--font-heading);
        letter-spacing: 0.08em;
        font-style: italic;
    }

    .modal-close {
        background: none;
        border: none;
        font-size: 18px;
        color: var(--text-secondary);
        cursor: pointer;
        padding: 0;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 2px;
        transition: all 0.2s ease;
        opacity: 0.6;
    }

    .modal-close:hover {
        background: rgba(200, 169, 110, 0.08);
        color: var(--text-primary);
        opacity: 1;
    }

    .form-group {
        margin-bottom: 18px;
    }

    .form-label {
        display: block;
        margin-bottom: 7px;
        font-size: 11px;
        font-weight: 500;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.08em;
    }

    .form-input,
    .form-textarea,
    .form-select {
        width: 100%;
        padding: 9px 12px;
        border: 1px solid var(--border-color);
        border-radius: 2px;
        font-size: 13px;
        font-family: var(--font-body);
        transition: all 0.2s ease;
        background: var(--light-bg);
        color: var(--text-primary);
    }

    .form-input:focus,
    .form-textarea:focus,
    .form-select:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 2px rgba(200, 169, 110, 0.12);
    }

    .form-textarea {
        resize: vertical;
        min-height: 90px;
    }

    .form-row {
        display: flex;
        gap: 14px;
    }

    .form-row .form-group {
        flex: 1;
    }

    .priority-options {
        display: flex;
        gap: 8px;
    }

    .priority-option {
        flex: 1;
        padding: 10px 8px;
        border: 1px solid var(--border-color);
        border-radius: 2px;

        height: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        font-weight: 600;
    }

    .sidebar-toggle {
      display: inline-flex;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);

      border: none;

      font-weight: 500;

      cursor: pointer;
      transition: all 0.2s ease;

      position: relative;
    }

    .tab-btn.active {
      color: var(--text-primary);
      border-bottom: 1px solid var(--primary-color);
    }

    .tab-btn:hover {
      color: var(--text-primary);
    }

    .tab-badge {
      position: absolute;
      top: 4px;
      right: 2px;
      background: var(--danger-color);
      color: white;

      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 600;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 20px;

      color: var(--text-secondary);
      cursor: pointer;
      font-size: 16px;
    }

    @keyframes slideInToast {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

        text-align: center;
        padding: 40px 20px;
        color: var(--text-secondary);
    }

    .empty-state i {
        font-size: 32px;
        margin-bottom: 14px;

        letter-spacing: 0.04em;

        animation: fadeIn 0.25s ease-in-out;

        animation: slideIn 0.3s ease-out;
